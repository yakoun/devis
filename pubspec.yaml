name: devis
description: "YTech Pro - ERP Flutter pour artisans et PME"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.70.2
  pdf: ^3.11.2
  printing: ^5.14.2
  local_auth: ^2.3.0
  crypto: ^3.0.6
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0+3
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  json_annotation: ^4.9.0
  connectivity_plus: ^6.1.4
  flutter_svg: ^2.0.17
  photo_view: ^0.15.0
  permission_handler: ^11.3.1
  file_picker: ^10.3.10
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_icon.png"
  adaptive_icon_background: "#0a0a1a"
  adaptive_icon_foreground: "assets/logo_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/splash_bg.svg
    - assets/logo_ytech.svg
