<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#fef9c3" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.12" />
    </filter>
    <pattern id="pcb" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M60 0 L60 30 M30 60 L90 60 M0 60 L0 120 M120 60 L120 0" stroke="#cbd5e1" stroke-width="1.5" fill="none" stroke-opacity="0.4" />
      <circle cx="60" cy="60" r="4" fill="#94a3b8" fill-opacity="0.3" />
      <circle cx="60" cy="0" r="3" fill="#94a3b8" fill-opacity="0.3" />
      <circle cx="0" cy="60" r="3" fill="#94a3b8" fill-opacity="0.3" />
      <circle cx="120" cy="60" r="3" fill="#94a3b8" fill-opacity="0.3" />
    </pattern>
  </defs>
  <rect width="1080" height="1920" fill="url(#bgGrad)" />
  <rect width="1080" height="1920" fill="url(#pcb)" />
  <g opacity="0.3">
    <path d="M0,1600 Q200,1500 400,1620 T800,1580 T1080,1650 L1080,1920 L0,1920 Z" fill="url(#boltGrad)" />
    <path d="M0,1720 Q250,1650 500,1750 T1000,1700 L1080,1740 L1080,1920 L0,1920 Z" fill="url(#circuitGrad)" opacity="0.5" />
  </g>
  <g transform="translate(100, 400)">
    <path d="M0,0 L-30,80 L10,70 L-20,160 L40,80 L-10,70 L20,0 Z" fill="url(#boltGrad)" filter="url(#neonGlow)" opacity="0.8" />
  </g>
  <g transform="translate(950, 600) scale(-1,1)">
    <path d="M0,0 L-30,80 L10,70 L-20,160 L40,80 L-10,70 L20,0 Z" fill="url(#boltGrad)" filter="url(#neonGlow)" opacity="0.6" />
  </g>
  <g transform="translate(800, 200)" opacity="0.7">
    <path d="M0,0 Q30,-40 60,-10 T120,-20 T180,10" stroke="#f97316" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="8 6" />
    <rect x="180" y="0" width="30" height="20" rx="4" fill="#475569" stroke="#1e293b" stroke-width="2" />
    <line x1="185" y1="5" x2="205" y2="5" stroke="#94a3b8" stroke-width="2" />
    <line x1="185" y1="10" x2="205" y2="10" stroke="#94a3b8" stroke-width="2" />
    <line x1="185" y1="15" x2="205" y2="15" stroke="#94a3b8" stroke-width="2" />
