      <line x1="-40" y1="0" x2="-60" y2="0" />
      <line x1="-40" y1="20" x2="-60" y2="20" />
      <line x1="40" y1="-20" x2="60" y2="-20" />
      <line x1="40" y1="0" x2="60" y2="0" />
      <line x1="40" y1="20" x2="60" y2="20" />
      <line x1="-20" y1="-40" x2="-20" y2="-60" />
      <line x1="0" y1="-40" x2="0" y2="-60" />
      <line x1="20" y1="-40" x2="20" y2="-60" />
      <line x1="-20" y1="40" x2="-20" y2="60" />
      <line x1="0" y1="40" x2="0" y2="60" />
      <line x1="20" y1="40" x2="20" y2="60" />
