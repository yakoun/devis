    <g transform="translate(200, 900)">
      <rect x="-12" y="-20" width="24" height="40" rx="4" fill="#e2e8f0" stroke="#475569" stroke-width="2" />
      <circle cx="-4" cy="-5" r="3" fill="#1e293b" />
      <circle cx="4" cy="-5" r="3" fill="#1e293b" />
      <rect x="-2" y="5" width="4" height="8" fill="#1e293b" rx="1" />
    </g>
    <g transform="translate(150, 500) rotate(30)">
      <rect x="-4" y="-30" width="8" height="40" rx="3" fill="#64748b" />
      <circle cx="0" cy="-30" r="10" fill="none" stroke="#64748b" stroke-width="6" />
    </g>
  </g>
  <g>
    <circle cx="300" cy="1100" r="3" fill="#f97316" filter="url(#neonGlow)" />
    <circle cx="800" cy="1400" r="2" fill="#3b82f6" />
    <circle cx="500" cy="1700" r="4" fill="#facc15" filter="url(#neonGlow)" />
  </g>
  <g transform="translate(540, 1750)" opacity="0" filter="url(#neonGlow)">
    <path d="M-100,0 Q-80,-20 -60,-5 Q-40,10 -20,-15 Q0,-40 20,-10 Q40,20 60,-5 Q80,-30 100,0" stroke="url(#circuitGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <text x="0" y="30" font-family="'Segoe UI'" font-size="14" fill="#334155" text-anchor="middle" letter-spacing="2">YTech - L'innovation au service de vos travaux</text>
