    <line x1="0" y1="0" x2="0" y2="-420" stroke="#f97316" stroke-width="2" stroke-dasharray="10 10" />
    <line x1="0" y1="0" x2="-300" y2="300" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6 12" />
  </g>
  <text x="540" y="220" font-family="'Segoe UI', Arial" font-size="56" font-weight="900" fill="#0f172a" text-anchor="middle" filter="url(#neonGlow)">DEVIS EXPRESS</text>
  <text x="540" y="290" font-family="'Segoe UI', Arial" font-size="24" font-weight="500" fill="#475569" text-anchor="middle">Électricité • Informatique • Dépannage 24/7</text>
