    <circle cx="0" cy="0" r="290" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 20" opacity="0.6" />
    <circle cx="0" cy="0" r="260" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4 12" opacity="0.4" />
    <rect x="-180" y="-240" width="360" height="480" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <rect x="-180" y="-240" width="360" height="100" rx="28" fill="#0f172a" />
    <rect x="-180" y="-140" width="360" height="100" fill="#0f172a" />
    <text x="0" y="-195" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900" fill="#facc15" text-anchor="middle" letter-spacing="6" filter="url(#neonGlow)">YTech</text>
    <text x="0" y="-160" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="2">Young Innovation</text>
    <text x="-140" y="-110" font-family="monospace" font-size="12" fill="#475569">DEVIS N° ELEC-2025-001</text>
    <g stroke="#334155" stroke-width="3" stroke-linecap="round">
      <line x1="-140" y1="-75" x2="100" y2="-75" />
      <text x="-145" y="-70" font-family="'Segoe UI'" font-size="11" fill="#f97316" stroke="none">⚡</text>
      <line x1="-140" y1="-45" x2="130" y2="-45" />
      <text x="-145" y="-40" font-family="'Segoe UI'" font-size="11" fill="#3b82f6" stroke="none">🖧</text>
      <line x1="-140" y1="-15" x2="80" y2="-15" />
      <text x="-145" y="-10" font-family="'Segoe UI'" font-size="11" fill="#8b5cf6" stroke="none">🔧</text>
