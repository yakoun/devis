      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="75" r="4" fill="#1e1e2f">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <line x1="-40" y1="-40" x2="-10" y2="-10" stroke="#0055ff" stroke-width="2" opacity="0.6" stroke-dasharray="4 4" />
    <line x1="40" y1="-40" x2="10" y2="-10" stroke="#ff6600" stroke-width="2" opacity="0.6" stroke-dasharray="4 4" />
    <line x1="0" y1="65" x2="0" y2="75" stroke="#1e1e2f" stroke-width="2" opacity="0.6" stroke-dasharray="3 3" />
  </g>
  <text x="250" y="280" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" font-weight="800" fill="#1e1e2f" text-anchor="middle" letter-spacing="1">
