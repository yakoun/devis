    <path d="M0,20 L0,65" fill="none" stroke="#1e1e2f" stroke-width="9" stroke-linecap="round" />
    <line x1="-15" y1="42" x2="15" y2="42" stroke="#ff6600" stroke-width="4" stroke-linecap="round" />
    <line x1="-10" y1="54" x2="10" y2="54" stroke="#ff6600" stroke-width="3" stroke-linecap="round" />
    <circle cx="0" cy="0" r="10" fill="#0055ff" opacity="0.8" />
    <circle cx="-45" cy="-45" r="5" fill="#0055ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
